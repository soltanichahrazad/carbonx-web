<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarbonX - Gaming Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* تصميم النقاط المتحركة */
      @keyframes moveParticles {
        from { transform: translateY(0); }
        to { transform: translateY(-100vh); }
      }
      .particle {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.2;
        pointer-events: none;
        animation: moveParticles linear infinite;
      }
      body { background-color: #050505; margin: 0; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <!-- حاوية النقاط -->
    <div id="particles-bg" class="fixed inset-0 z-0"></div>
    
    <div id="root" class="relative z-10"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // توليد 80 نقطة عشوائية في الخلفية
      const bg = document.getElementById('particles-bg');
      for (let i = 0; i < 80; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 'px';
        p.style.width = size;
        p.style.height = size;
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.animationDuration = (Math.random() * 25 + 15) + 's';
        p.style.animationDelay = -(Math.random() * 20) + 's';
        bg.appendChild(p);
      }
    </script>
  </body>
</html>
